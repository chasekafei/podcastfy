conversation_style: 
  - "engaging"
  - "fast-paced"
  - "enthusiastic"
roles_person1: "main summarizer"
roles_person2: "questioner/clarifier"
dialogue_structure: 
  - "Introduction"
  - "Main Content Summary"
  - "Conclusion"
podcast_name: "PODCASTIFY"
podcast_tagline: "Your Personal Generative AI Podcast"
output_language: "English"
engagement_techniques: 
  - "rhetorical questions"
  - "anecdotes"
  - "analogies"
  - "humor"
creativity: 1
user_instructions: ""
max_num_chunks: 8 # maximum number of rounds of discussions in longform
min_chunk_size: 600 # minimum number of characters to generate a round of discussion in longform

text_to_speech:
  default_tts_model: "openai"
  output_directories:
    transcripts: "./data/transcripts"
    audio: "./data/audio"
  elevenlabs:
    default_voices:
      question: "Chris"
      answer: "Jessica"
    model: "eleven_multilingual_v2"
  openai:
    default_voices:
      question: "echo"
      answer: "shimmer"
    model: "tts-1-hd"
  edge:
    default_voices:
      question: "en-US-JennyNeural"
      answer: "en-US-EricNeural"
  gemini:
    default_voices:
      question: "en-US-Journey-D"
      answer: "en-US-Journey-O"
  geminimulti:
    default_voices:
      question: "R"
      answer: "S"
  fishaudio:
    default_voices:
      question: "97b59eed11b9480f8bbc1ac0f1cc36ee"
      answer: "94e6373ce822426d92a0b3b6a866479b"
    model: "s2-pro"
    voice_speeds:
      97b59eed11b9480f8bbc1ac0f1cc36ee: 1.2
      94e6373ce822426d92a0b3b6a866479b: 1.1
    # Emotion annotation — adds S2-Pro [bracket] cues to each dialogue turn
    # before audio is generated.  Set to false to disable.
    emotion_annotation: true
    # LLM model used for annotation.  Any model reachable via LLM_BASE_URL works.
    annotation_model: "gemini-3-flash-preview"
  audio_format: "mp3"
  temp_audio_dir: "data/audio/tmp/"
  ending_message: "See You Next Time!"

# ---------------------------------------------------------------------------
# Style presets — pass "style": "<key>" in the API request to activate.
# The preset's instructions are injected into the system prompt at highest
# priority. You can still pass "user_instructions" alongside to append more.
# ---------------------------------------------------------------------------
style_presets:
  colloquial_zh: |
    # 播客对话生成规则

    你是一个播客脚本生成器。根据用户提供的口语化素材或话题，生成一段自然、真实、有临场感的双人播客对话。

    ## 角色设定
    - 用户会指定两位主播的名字和各自的角色定位（如主聊人、捧哏、提问者等）。若未指定，默认使用 [A] 和 [B]。

    ## 核心原则：像真人在说话，不是在念稿

    ### 1. 语气词与填充词
    在句子中自然穿插以下语气词，频率大约每2-4句出现1-2次，不要每句都加：
    - 句中停顿/思考："呃"、"嗯"、"那个"、"就是"、"怎么说呢"
    - 句尾语气：  "嘛"、"呢"、"啊"、"吧"、"诶"、"嘛对吧"
    - 确认/回应：  "对对对"、"嗯嗯"、"哦？"、"是吧"

    ### 2. 重复与结巴
    模拟真人说话时的卡顿和重复，例如：
    - 词语重复："就是、就是那个意思"
    - 轻微结巴："它不、它不同步"、"比、比我好"
    - 叠词强调："等等等等"、"不对不对"、"好了好了"、"拜拜拜拜"

    ### 3. 自我修正与重组
    说到一半改口或换一种说法，例如：
    - "就好比你……你这么想吧"
    - "那个什么……享乐适应，就是说……"
    - "因为还是有一部分新用户嘛，他们还没被……还没被'辣麻'呢"

    ### 4. 省略与未说完
    用"……"表示话语的自然中断或留白：
    - "现在就……就划过去了。"
    - "然后就……没了？"
    - "变成纯粹的那个……感官杂耍了。"

    ### 5. 口语化句式
    - 避免书面语长句，多用短句、碎句
    - 允许语法不完整："但那种'哇火车在动'的新鲜感能持续多久嘛？"
    - 大量使用"你想啊"、"你看啊"、"说白了就是"、"你懂我意思吧"等口语连接词

    ### 6. 互动节奏
    - 捧哏/提问者要有真实反应："哈哈哈"、"太真实了"、"这也太……"
    - 适当打断："等等，我插一句啊"
    - 追问或复述确认："所以你意思是说……？"、"我是不是可以这么理解——"

    ### 7. 禁止事项
    - ❌ 不要使用书面化的过渡词："首先/其次/最后"、"综上所述"、"值得注意的是"
    - ❌ 不要让两个人说话风格完全一样，要有性格区分
    - ❌ 不要每段对话都结构工整，真实对话是参差不齐的
    - ❌ 不要加旁白或舞台指示（如"笑着说"、"沉思片刻"）
